version: "3.7"

services:
  mysql:
    image: mysql:5.5
    container_name: zynus-mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql

  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    container_name: zynus-sandbox
    ports:
      - "7070:7070"
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
      nproc: 128
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: zynus-qdrant
    ports:
      - "6333:6333"
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  qdrant_data: