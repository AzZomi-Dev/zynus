version: "3.7"

services:
  mysql:
    image: mysql:5.5
    container_name: zynus-mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

  qdrant:
    image: qdrant/qdrant
    container_name: zynus-qdrant
    ports:
      - "6333:6333"
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant_data

volumes:
  qdrant_data: